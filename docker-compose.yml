services:
  app:
    profiles:
      - frontend
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api/v1}
        VITE_USE_MOCK: ${VITE_USE_MOCK:-true}
    ports:
      - "${APP_PORT:-3000}:80"

  db:
    profiles:
      - frontend
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adapt}
      POSTGRES_USER: ${POSTGRES_USER:-adapt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adapt_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
