server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compress text responses — cuts typical JS bundle size by ~70%.
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json
             application/xml image/svg+xml font/woff2;

  # Security headers that apply to every location that doesn't set its own.
  add_header X-Frame-Options        "SAMEORIGIN"                   always;
  add_header X-Content-Type-Options "nosniff"                      always;
  add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

  # index.html must never be cached: it's the SPA shell that references
  # the hashed assets. A stale shell loads the wrong JS/CSS after a deploy.
  location = /index.html {
    add_header Cache-Control          "no-cache, no-store, must-revalidate";
    add_header X-Frame-Options        "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
  }

  # SPA fallback: unknown paths serve index.html so React Router handles them.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Vite outputs content-hashed filenames under /assets/ — safe to cache forever.
  location /assets/ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control          "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
  }
}
